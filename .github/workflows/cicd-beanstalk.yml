name: CICD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [ ubuntu-latest ]
    environment: BNOJ
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create .env file from GitHub Secret
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_PRODUCTION_V1 }}
        run: |
          echo "$ENV_FILE_CONTENT" > .env.production
      - name: Install Dependencies
        run: npm install
      - name: Genrate Deployment Package
        run: zip -r nodejs-app-build.zip .
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: 'info-service'
          environment_name: 'Info-service-env-1'
          version_label: "${{ github.sha }}-${{ github.run_attempt }}"          
          region: us-east-1
          deployment_package: nodejs-app-build.zip
